# Publica a experiência web (pasta web/) no GitHub Pages a cada push na main.
# Ativação: Settings > Pages > Build and deployment > Source = "GitHub Actions".
name: Deploy web to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissões mínimas para o deploy oficial do Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Uma execução por vez; não cancela um deploy em andamento.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload web/ artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
